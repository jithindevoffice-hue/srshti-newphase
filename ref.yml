name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - br-v1
      - main
      - prod
      - stg
  workflow_dispatch:

env:
  PROJECT_NAME: dent-cue360-mob

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Set API base URL
        run: |
          echo "Determining API base URL for branch ${GITHUB_REF_NAME:-${{ github.ref_name }}}"
          if [ "${{ github.ref_name }}" = "stg" ]; then
            echo "REACT_APP_API_BASE_URL=${{ secrets.STAGING_API_BASE_URL }}" >> "$GITHUB_ENV"
          else
            echo "REACT_APP_API_BASE_URL=${{ secrets.REACT_APP_API_BASE_URL }}" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build
        env:
          CI: false
          REACT_APP_API_BASE_URL: ${{ env.REACT_APP_API_BASE_URL }}

      - name: Create Cloudflare Pages project if not exists
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create ${{ env.PROJECT_NAME }} --production-branch=prod
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build --project-name=${{ env.PROJECT_NAME }} --branch=${{ github.ref_name }}